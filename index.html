<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор документов 152-ФЗ (Pro)</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; font-size: 0.95em; }
        
        .section-title { font-size: 1.2em; font-weight: bold; color: #34495e; margin-top: 25px; margin-bottom: 15px; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #2c3e50; }
        .sub-label { font-size: 0.85em; color: #7f8c8d; font-weight: normal; display: block; margin-bottom: 5px; }
        
        input[type="text"], input[type="email"], input[type="url"], select, textarea { 
            width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; font-size: 14px; transition: border 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: #3498db; outline: none; }
        
        /* Checkbox Styles */
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        .checkbox-item { 
            display: flex; align-items: center; gap: 10px; background: #f8f9fa; padding: 12px; 
            border-radius: 6px; cursor: pointer; transition: background 0.2s; border: 1px solid #eee;
        }
        .checkbox-item:hover { background: #eef2f3; }
        .checkbox-item input { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-item span { user-select: none; font-size: 14px; }

        /* Dynamic Lists Styles */
        .dynamic-list-container { background: #fdfdfd; border: 1px dashed #bdc3c7; padding: 15px; border-radius: 6px; margin-top: 10px; }
        .list-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
        .list-row select { flex: 1; min-width: 200px; }
        .list-row input { flex: 2; min-width: 200px; }
        .btn-add { background: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .btn-add:hover { background: #2980b9; }
        .btn-remove { background: #e74c3c; color: white; border: none; width: 30px; height: 30px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-remove:hover { background: #c0392b; }

        /* Toggle for "None" option */
        .toggle-none { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; background: #e8f6f3; padding: 10px; border-radius: 4px; border: 1px solid #a2d9ce; }
        .toggle-none input { width: 18px; height: 18px; }
        .hidden { display: none; }

        button.action-btn { 
            display: block; width: 100%; padding: 15px; margin-top: 10px;
            color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; 
            cursor: pointer; transition: transform 0.1s, opacity 0.2s; 
        }
        .btn-generate { background-color: #27ae60; }
        .btn-generate:hover { background-color: #219150; }
        .btn-copy { background-color: #f39c12; margin-top: 15px; display: none; }
        .btn-copy:hover { background-color: #d35400; }
        .btn-download { background-color: #3498db; margin-top: 10px; display: none; }
        .btn-download:hover { background-color: #2980b9; }

        /* Preview Area */
        #previewArea { 
            margin-top: 30px; padding: 25px; border: 1px solid #ddd; background: #fff; 
            border-radius: 6px; white-space: pre-wrap; font-family: 'Times New Roman', Times, serif; 
            font-size: 14pt; line-height: 1.5; color: #000; max-height: 600px; overflow-y: auto;
            display: none;
        }
        .preview-heading { font-weight: bold; font-size: 16pt; margin-top: 20px; margin-bottom: 10px; text-align: center; }
        .preview-subheading { font-weight: bold; font-size: 14pt; margin-top: 15px; margin-bottom: 5px; }
        
        .note { font-size: 0.85em; color: #95a5a6; margin-top: 5px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>Генератор документов 152-ФЗ</h1>
    <p class="subtitle">Заполните данные, выберите опции и получите готовый документ для сайта</p>

    <!-- Тип документа -->
    <div class="form-group">
        <label for="docType">1. Выберите тип документа:</label>
        <select id="docType" onchange="resetForm()">
            <option value="policy">Политика обработки ПДн</option>
            <option value="cookie">Политика использования Cookie</option>
            <option value="consent">Согласие на обработку ПДн (для форм)</option>
            <option value="newsletter">Согласие на рассылку</option>
            <option value="distribution">Согласие на распространение ПДн</option>
            <option value="agreement">Пользовательское соглашение</option>
        </select>
    </div>

    <!-- Данные организации -->
    <div class="section-title">2. Данные Оператора (Владельца сайта)</div>
    <div class="form-group">
        <input type="text" id="orgName" placeholder="Полное название (например, ООО 'Ромашка' или ИП Иванов И.И.)" required>
        <input type="text" id="orgInn" placeholder="ИНН" style="margin-top: 10px;">
        <input type="text" id="orgOgrn" placeholder="ОГРН (необязательно)" style="margin-top: 10px;">
        <input type="text" id="orgAddress" placeholder="Юридический адрес" style="margin-top: 10px;">
        <input type="email" id="orgEmail" placeholder="Email для связи" style="margin-top: 10px;">
        <input type="text" id="orgPhone" placeholder="Телефон" style="margin-top: 10px;">
    </div>

    <!-- Данные сайта -->
    <div class="section-title">3. Данные сайта</div>
    <div class="form-group">
        <label>Адрес сайта (домен):</label>
        <input type="url" id="siteUrl" placeholder="https://mysite.ru" required>
        <div class="note">Документ будет ссылаться на этот адрес.</div>
    </div>

    <!-- Функционал сайта -->
    <div class="section-title">4. Что используется на сайте?</div>
    <div class="checkbox-grid">
        <label class="checkbox-item"><input type="checkbox" id="useForms"> <span>Формы обратной связи / Заявки</span></label>
        <label class="checkbox-item"><input type="checkbox" id="useCookies"> <span>Cookie файлы</span></label>
        <label class="checkbox-item"><input type="checkbox" id="useAnalytics"> <span>Яндекс.Метрика / Google Analytics</span></label>
        <label class="checkbox-item"><input type="checkbox" id="usePayment"> <span>Онлайн-оплата (эквайринг)</span></label>
        <label class="checkbox-item"><input type="checkbox" id="useRegistration"> <span>Личный кабинет / Регистрация</span></label>
        <label class="checkbox-item"><input type="checkbox" id="useCalls"> <span>Заказ обратного звонка</span></label>
        <label class="checkbox-item"><input type="checkbox" id="useShipping"> <span>Доставка товаров (курьеры/почта)</span></label>
        <label class="checkbox-item"><input type="checkbox" id="useCRM"> <span>CRM-система</span></label>
        <label class="checkbox-item"><input type="checkbox" id="useHosting"> <span>Хостинг-провайдер</span></label>
    </div>

    <!-- Динамические блоки (появляются в зависимости от типа документа) -->
    <div id="dynamicBlocks"></div>

    <button class="action-btn btn-generate" onclick="generateDocument()">Сгенерировать документ</button>
    
    <div id="resultActions" style="display:none;">
        <button class="action-btn btn-download" id="btnDownload" onclick="downloadDoc()">Скачать .docx</button>
        <button class="action-btn btn-copy" id="btnCopy" onclick="copyText()">Копировать текст в буфер</button>
        <div id="copyStatus" style="text-align:center; color: green; margin-top:5px; display:none;">Текст скопирован!</div>
    </div>

    <div id="previewArea"></div>
</div>

<script>
    // --- Конфигурация списков ---
    const thirdPartiesOptions = [
        { val: 'hosting', text: 'Хостинг-провайдер (сервер)' },
        { val: 'crm', text: 'CRM-система' },
        { val: 'email_service', text: 'Сервис email-рассылок' },
        { val: 'payment', text: 'Платежный агрегатор / Банк' },
        { val: 'delivery', text: 'Курьерская служба / Почта' },
        { val: 'analytics', text: 'Сервисы веб-аналитики (Яндекс, Google)' },
        { val: 'call_service', text: 'Сервис телефонии / Колл-трекинг' },
        { val: 'contractors', text: 'Иные подрядчики (разработка, поддержка)' }
    ];

    const dataTypesOptions = [
        { val: 'fio', text: 'Фамилия, Имя, Отчество' },
        { val: 'phone', text: 'Номер телефона' },
        { val: 'email', text: 'Адрес электронной почты' },
        { val: 'address', text: 'Почтовый/юридический адрес' },
        { val: 'passport', text: 'Паспортные данные (серия, номер)' },
        { val: 'birth', text: 'Дата рождения' },
        { val: 'order_info', text: 'Информация о заказах' },
        { val: 'cookies', text: 'Данные cookie и IP-адрес' },
        { val: 'other', text: 'Иные данные, предоставленные пользователем' }
    ];

    const actionsOptions = [
        { val: 'collect', text: 'Сбор' },
        { val: 'record', text: 'Запись' },
        { val: 'systematize', text: 'Систематизация' },
        { val: 'accumulate', text: 'Накопление' },
        { val: 'store', text: 'Хранение' },
        { val: 'clarify', text: 'Уточнение (обновление, изменение)' },
        { val: 'extract', text: 'Извлечение' },
        { val: 'use', text: 'Использование' },
        { val: 'transfer', text: 'Передача (предоставление, доступ)' },
        { val: 'depersonalize', text: 'Обезличивание' },
        { val: 'block', text: 'Блокирование' },
        { val: 'delete', text: 'Удаление' },
        { val: 'destroy', text: 'Уничтожение' }
    ];

    let currentDocBlob = null;
    let currentTextContent = "";

    // --- Инициализация ---
    function resetForm() {
        document.getElementById('previewArea').style.display = 'none';
        document.getElementById('resultActions').style.display = 'none';
        renderDynamicBlocks();
    }

    function renderDynamicBlocks() {
        const type = document.getElementById('docType').value;
        const container = document.getElementById('dynamicBlocks');
        container.innerHTML = '';

        if (type === 'policy') {
            container.innerHTML += createThirdPartiesBlock();
            container.innerHTML += createDataTypesBlock('Цели обработки (кратко):', 'policy_goals');
        } else if (type === 'consent') {
            container.innerHTML += createDataTypesBlock('Перечень обрабатываемых данных:', 'consent_data');
            container.innerHTML += createActionsBlock();
        } else if (type === 'distribution') {
            container.innerHTML += createDataTypesBlock('Перечень данных для распространения:', 'dist_data');
            container.innerHTML += createThirdPartiesBlock('Категории получателей (кому можно передавать):');
        } else if (type === 'agreement') {
             container.innerHTML += createThirdPartiesBlock();
        }
    }

    // --- Генераторы блоков ---
    function createThirdPartiesBlock(labelText = 'Третьи лица, которым передаются данные:') {
        return `
        <div class="section-title">5. Передача данных третьим лицам</div>
        <div class="toggle-none">
            <input type="checkbox" id="noThirdParties" onchange="toggleThirdPartiesList()">
            <label for="noThirdParties" style="margin:0; cursor:pointer;">Данные НЕ передаются третьим лицам</label>
        </div>
        <div id="thirdPartiesList" class="dynamic-list-container">
            <label>${labelText}</label>
            <div class="note">Выберите из списка или впишите свой вариант. По умолчанию добавлены популярные сервисы.</div>
            <div id="tpRows"></div>
            <button type="button" class="btn-add" onclick="addThirdPartyRow()">+ Добавить еще</button>
        </div>
        `;
    }

    function createDataTypesBlock(labelText, prefix) {
        return `
        <div class="section-title">5. Состав данных</div>
        <div class="toggle-none">
            <input type="checkbox" id="noDataLimit_${prefix}" onchange="toggleDataList('${prefix}')">
            <label for="noDataLimit_${prefix}" style="margin:0; cursor:pointer;">Использовать стандартный полный перечень</label>
        </div>
        <div id="dataList_${prefix}" class="dynamic-list-container">
            <label>${labelText}</label>
            <div class="note">Отметьте только те данные, которые вы реально собираете.</div>
            <div id="dtRows_${prefix}"></div>
            <button type="button" class="btn-add" onclick="addDataTypeRow('${prefix}')">+ Добавить тип данных</button>
        </div>
        `;
    }

    function createActionsBlock() {
        return `
        <div class="section-title">6. Действия с данными</div>
        <div class="toggle-none">
            <input type="checkbox" id="allActions" checked onchange="toggleActionsList()">
            <label for="allActions" style="margin:0; cursor:pointer;">Весь полный перечень действий (стандарт для 152-ФЗ)</label>
        </div>
        <div id="actionsList" class="dynamic-list-container hidden">
            <label>Выберите действия, которые вы совершаете:</label>
            <div id="actRows"></div>
            <button type="button" class="btn-add" onclick="addActionRow()">+ Добавить действие</button>
        </div>
        `;
    }

    // --- Логика управления списками ---
    function toggleThirdPartiesList() {
        const isChecked = document.getElementById('noThirdParties').checked;
        document.getElementById('thirdPartiesList').classList.toggle('hidden', isChecked);
    }

    function toggleDataList(prefix) {
        const isChecked = document.getElementById(`noDataLimit_${prefix}`).checked;
        // Если чекбокс "Стандартный" нажат, скрываем список и используем дефолт
        document.getElementById(`dataList_${prefix}`).classList.toggle('hidden', isChecked);
    }

    function toggleActionsList() {
        const isChecked = document.getElementById('allActions').checked;
        document.getElementById('actionsList').classList.toggle('hidden', isChecked);
    }

    function addThirdPartyRow(defaultVal = '') {
        const container = document.getElementById('tpRows');
        const row = document.createElement('div');
        row.className = 'list-row';
        
        let optionsHtml = `<option value="">-- Выберите из списка --</option>`;
        thirdPartiesOptions.forEach(opt => {
            const selected = (opt.val === defaultVal) ? 'selected' : '';
            optionsHtml += `<option value="${opt.text}" ${selected}>${opt.text}</option>`;
        });

        row.innerHTML = `
            <select class="tp-select">${optionsHtml}</select>
            <input type="text" class="tp-input" placeholder="Или впишите название вручную">
            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">×</button>
        `;
        container.appendChild(row);
    }

    function addDataTypeRow(prefix, defaultVal = '') {
        const container = document.getElementById(`dtRows_${prefix}`);
        const row = document.createElement('div');
        row.className = 'list-row';
        
        let optionsHtml = `<option value="">-- Выберите тип данных --</option>`;
        dataTypesOptions.forEach(opt => {
            const selected = (opt.text === defaultVal) ? 'selected' : '';
            optionsHtml += `<option value="${opt.text}" ${selected}>${opt.text}</option>`;
        });

        row.innerHTML = `
            <select class="dt-select">${optionsHtml}</select>
            <input type="text" class="dt-input" placeholder="Или впишите свой вариант">
            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">×</button>
        `;
        container.appendChild(row);
    }

    function addActionRow(defaultVal = '') {
        const container = document.getElementById('actRows');
        const row = document.createElement('div');
        row.className = 'list-row';
        
        let optionsHtml = `<option value="">-- Выберите действие --</option>`;
        actionsOptions.forEach(opt => {
            const selected = (opt.text === defaultVal) ? 'selected' : '';
            optionsHtml += `<option value="${opt.text}" ${selected}>${opt.text}</option>`;
        });

        row.innerHTML = `
            <select class="act-select">${optionsHtml}</select>
            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">×</button>
        `;
        container.appendChild(row);
    }

    // Сбор данных из списков
    function getThirdPartiesList() {
        if (document.getElementById('noThirdParties').checked) return null; // Не передаются
        
        const rows = document.querySelectorAll('#tpRows .list-row');
        const items = [];
        rows.forEach(row => {
            const select = row.querySelector('.tp-select').value;
            const input = row.querySelector('.tp-input').value.trim();
            if (select) items.push(select);
            else if (input) items.push(input);
        });
        return items.length > 0 ? items : ['Не передаются третьим лицам'];
    }

    function getDataList(prefix) {
        // Если чекбокс "Стандартный" активен, возвращаем полный список по умолчанию
        if (document.getElementById(`noDataLimit_${prefix}`).checked) {
            return dataTypesOptions.map(o => o.text);
        }

        const rows = document.querySelectorAll(`#dtRows_${prefix} .list-row`);
        const items = [];
        rows.forEach(row => {
            const select = row.querySelector('.dt-select').value;
            const input = row.querySelector('.dt-input').value.trim();
            if (select) items.push(select);
            else if (input) items.push(input);
        });
        return items.length > 0 ? items : ['Фамилия, имя', 'Телефон', 'Email']; // Дефолт если пусто
    }

    function getActionsList() {
        if (document.getElementById('allActions').checked) {
            return actionsOptions.map(o => o.text);
        }
        const rows = document.querySelectorAll('#actRows .list-row');
        const items = [];
        rows.forEach(row => {
            const val = row.querySelector('.act-select').value;
            if (val) items.push(val);
        });
        return items.length > 0 ? items : ['Сбор', 'Хранение', 'Использование'];
    }

    // --- ГЕНЕРАЦИЯ ДОКУМЕНТА ---
    function generateDocument() {
        const docType = document.getElementById('docType').value;
        const orgName = document.getElementById('orgName').value || "[Название Организации]";
        const orgInn = document.getElementById('orgInn').value || "[ИНН]";
        const orgAddress = document.getElementById('orgAddress').value || "[Адрес]";
        const orgEmail = document.getElementById('orgEmail').value || "[Email]";
        const siteUrl = document.getElementById('siteUrl').value || "[Адрес Сайта]";

        const opt = {
            forms: document.getElementById('useForms').checked,
            cookies: document.getElementById('useCookies').checked,
            analytics: document.getElementById('useAnalytics').checked,
            payment: document.getElementById('usePayment').checked,
            registration: document.getElementById('useRegistration').checked,
            calls: document.getElementById('useCalls').checked,
            shipping: document.getElementById('useShipping').checked,
            crm: document.getElementById('useCRM').checked,
            hosting: document.getElementById('useHosting').checked
        };

        // Собираем динамические данные
        const thirdParties = getThirdPartiesList();
        const consentData = getDataList('consent_data');
        const distData = getDataList('dist_data');
        const policyGoals = getDataList('policy_goals');
        const actions = getActionsList();

        let content = [];
        const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, LineRuleType } = docx;

        // Заголовок
        const title = getDocTitle(docType);
        content.push(new Paragraph({
            text: title,
            heading: HeadingLevel.TITLE,
            alignment: AlignmentType.CENTER,
            spacing: { after: 400, before: 200 }
        }));

        // Текст
        const lines = getBodyText(docType, orgName, orgInn, orgAddress, orgEmail, siteUrl, opt, thirdParties, consentData, distData, policyGoals, actions);
        
        lines.forEach(line => {
            if (line.type === 'h1') {
                content.push(new Paragraph({
                    text: line.text,
                    heading: HeadingLevel.HEADING_1,
                    spacing: { before: 300, after: 150 }
                }));
            } else if (line.type === 'h2') {
                content.push(new Paragraph({
                    text: line.text,
                    heading: HeadingLevel.HEADING_2,
                    spacing: { before: 250, after: 100 }
                }));
            } else if (line.type === 'list') {
                line.items.forEach(item => {
                    content.push(new Paragraph({
                        children: [new TextRun({ text: "• " + item, break: 1 })],
                        spacing: { after: 50 },
                        indent: { left: 700 }
                    }));
                });
            } else {
                content.push(new Paragraph({
                    children: [new TextRun({ text: line.text, break: 1 })],
                    spacing: { after: 150 }
                }));
            }
        });

        const doc = new Document({
            sections: [{
                properties: {},
                children: content
            }]
        });

        Packer.toBlob(doc).then(blob => {
            currentDocBlob = blob;
            
            // Генерация текста для превью
            let previewHtml = `<div class="preview-heading">${title}</div>`;
            lines.forEach(line => {
                if (line.type === 'h1') previewHtml += `<div class="preview-subheading">${line.text}</div>`;
                else if (line.type === 'h2') previewHtml += `<div style="font-weight:bold; margin-top:10px;">${line.text}</div>`;
                else if (line.type === 'list') {
                    line.items.forEach(item => previewHtml += `<div>• ${item}</div>`);
                }
                else previewHtml += `<div>${line.text.replace(/\n/g, '<br>')}</div>`;
            });
            
            const previewArea = document.getElementById('previewArea');
            previewArea.innerHTML = previewHtml;
            previewArea.style.display = 'block';
            
            document.getElementById('resultActions').style.display = 'block';
            document.getElementById('btnDownload').style.display = 'block';
            document.getElementById('btnCopy').style.display = 'block';
            document.getElementById('copyStatus').style.display = 'none';

            // Скролл к превью
            previewArea.scrollIntoView({ behavior: 'smooth' });
        });
    }

    function downloadDoc() {
        if (currentDocBlob) {
            saveAs(currentDocBlob, `Document_152FZ.docx`);
        }
    }

    function copyText() {
        const text = document.getElementById('previewArea').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const status = document.getElementById('copyStatus');
            status.style.display = 'block';
            setTimeout(() => status.style.display = 'none', 2000);
        });
    }

    // --- ТЕКСТОВЫЕ ШАБЛОНЫ ---
    function getDocTitle(type) {
        const titles = {
            'policy': 'ПОЛИТИКА ОБРАБОТКИ ПЕРСОНАЛЬНЫХ ДАННЫХ',
            'cookie': 'ПОЛИТИКА ИСПОЛЬЗОВАНИЯ COOKIE ФАЙЛОВ',
            'consent': 'СОГЛАСИЕ НА ОБРАБОТКУ ПЕРСОНАЛЬНЫХ ДАННЫХ',
            'newsletter': 'СОГЛАСИЕ НА ПОЛУЧЕНИЕ ИНФОРМАЦИОННОЙ РАССЫЛКИ',
            'distribution': 'СОГЛАСИЕ НА РАСПРОСТРАНЕНИЕ ПЕРСОНАЛЬНЫХ ДАННЫХ',
            'agreement': 'ПОЛЬЗОВАТЕЛЬСКОЕ СОГЛАШЕНИЕ'
        };
        return titles[type];
    }

    function getBodyText(type, org, inn, addr, email, url, opt, thirdParties, consentData, distData, policyGoals, actions) {
        let text = [];

        // Вспомогательная функция для списка третьих лиц
        const tpText = thirdParties === null 
            ? "Персональные данные не передаются третьим лицам." 
            : `Персональные данные могут передаваться следующим третьим лицам: ${thirdParties.join(', ')}. Передача осуществляется исключительно в целях, указанных в настоящей Политике, и при наличии соответствующих договоров.`;

        if (type === 'policy') {
            text.push({ type: 'h1', text: '1. Общие положения' });
            text.push({ type: 'text', text: `Настоящая политика обработки персональных данных составлена в соответствии с требованиями Федерального закона от 27.07.2006 № 152-ФЗ «О персональных данных». Оператором выступает ${org} (ИНН: ${inn}).` });
            text.push({ type: 'text', text: `Политика применяется ко всей информации, которую Оператор может получить о посетителях веб-сайта ${url}.` });

            text.push({ type: 'h1', text: '2. Цели обработки' });
            let goalsText = "Основные цели обработки:\n";
            if (opt.forms) goalsText += "- Обработка запросов через формы обратной связи;\n";
            if (opt.registration) goalsText += "- Предоставление доступа к личному кабинету;\n";
            if (opt.payment) goalsText += "- Оформление и оплата заказов;\n";
            if (opt.analytics) goalsText += "- Анализ посещаемости и улучшение качества сайта;\n";
            if (policyGoals && policyGoals.length > 0 && policyGoals[0] !== "Не передаются третьим лицам") {
                 // Если пользователь ввел свои цели
                 goalsText += policyGoals.map(g => `- ${g}`).join('\n');
            } else if (!opt.forms && !opt.registration && !opt.payment) {
                 goalsText += "- Идентификация пользователя;\n- Связь с пользователем.";
            }
            text.push({ type: 'text', text: goalsText });

            text.push({ type: 'h1', text: '3. Передача данных' });
            text.push({ type: 'text', text: tpText });

            text.push({ type: 'h1', text: '4. Контакты' });
            text.push({ type: 'text', text: `${org}\nАдрес: ${addr}\nEmail: ${email}` });

        } else if (type === 'consent') {
            text.push({ type: 'text', text: `Я, субъект персональных данных, даю свое согласие ${org} (ИНН: ${inn}) на обработку следующих моих персональных данных:` });
            text.push({ type: 'list', items: consentData });
            
            text.push({ type: 'text', text: `\nЦели обработки: ${opt.forms ? 'обработка заявок, ' : ''}${opt.calls ? 'перезвон, ' : ''}${opt.registration ? 'регистрация, ' : ''}информирование об услугах.` });
            
            text.push({ type: 'text', text: `\nС перечнем действий над данными я ознакомлен: ${actions.join(', ')}.` });
            text.push({ type: 'text', text: tpText });
            text.push({ type: 'text', text: "\nСогласие действует до момента его отзыва." });

        } else if (type === 'distribution') {
            text.push({ type: 'text', text: `Я даю согласие ${org} на распространение следующих моих персональных данных неопределенному кругу лиц:` });
            text.push({ type: 'list', items: distData });
            
            text.push({ type: 'text', text: `\nКатегории получателей: ${thirdParties === null ? 'Не определены (данные не распространяются)' : thirdParties.join(', ')}.` });
            text.push({ type: 'text', text: "\nЯ подтверждаю, что даю согласие свободно и в своем интересе." });

        } else if (type === 'cookie') {
            text.push({ type: 'h1', text: '1. Использование файлов Cookie' });
            text.push({ type: 'text', text: `Сайт ${url} использует файлы cookie для улучшения работы сервиса и анализа трафика.` });
            
            text.push({ type: 'h1', text: '2. Виды используемых данных' });
            let cookieList = [];
            if (opt.analytics) cookieList.push("Аналитические cookie (Яндекс.Метрика, Google Analytics)");
            if (opt.forms || opt.registration) cookieList.push("Функциональные cookie (авторизация, корзины)");
            if (opt.payment) cookieList.push("Платежные cookie (безопасность транзакций)");
            if (cookieList.length === 0) cookieList.push("Технические cookie, необходимые для работы сайта");
            
            text.push({ type: 'list', items: cookieList });
            text.push({ type: 'text', text: `\nВы можете отключить сохранение cookie в настройках вашего браузера.` });
            text.push({ type: 'text', text: `Контакты владельца: ${org}, ${email}` });

        } else if (type === 'agreement') {
            text.push({ type: 'h1', text: '1. Общие условия' });
            text.push({ type: 'text', text: `Настоящее соглашение регулирует использование сайта ${url}, принадлежащего ${org}.` });
            
            text.push({ type: 'h1', text: '2. Сбор данных' });
            text.push({ type: 'text', text: `Используя сайт, вы соглашаетесь на сбор и обработку данных в соответствии с Политикой конфиденциальности. Мы можем передавать данные третьим лицам для оказания услуг: ${tpText}` });
            
            text.push({ type: 'h1', text: '3. Ответственность' });
            text.push({ type: 'text', text: "Администрация сайта не несет ответственности за ущерб, причиненный пользователю в результате неправомерного использования материалов сайта." });
        }

        return text;
    }

    // Инициализация при загрузке
    window.onload = function() {
        // Добавим одну строку по умолчанию в списки, если они есть
        renderDynamicBlocks();
        // Небольшая задержка, чтобы DOM отрисовался перед добавлением дефолтных строк
        setTimeout(() => {
            const type = document.getElementById('docType').value;
            if(type === 'policy' || type === 'agreement') {
                // Дефолтные третьи лица для политики
                if(document.getElementById('useHosting')) addThirdPartyRow('hosting');
                if(document.getElementById('useAnalytics')) addThirdPartyRow('analytics');
            }
            if(type === 'consent') {
                addDataTypeRow('consent_data', 'Фамилия, Имя, Отчество');
                addDataTypeRow('consent_data', 'Номер телефона');
            }
        }, 100);
    };
</script>
