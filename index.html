<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор документов 152-ФЗ</title>
    <!-- Подключаем библиотеку для генерации DOCX -->
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1, h2 {
            color: var(--primary-color);
            text-align: center;
        }

        .step {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #fff;
        }

        .step-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
            display: block;
            color: var(--accent-color);
        }

        label {
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            background: #f1f1f1;
            padding: 8px;
            border-radius: 4px;
        }

        .checkbox-item input {
            margin-right: 10px;
        }

        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        .hidden {
            display: none;
        }

        .info-text {
            font-size: 0.9em;
            color: #666;
            margin-top: -10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Генератор документов 152-ФЗ</h1>
    <p style="text-align: center; color: #666;">Создайте готовые документы для вашего сайта за 2 минуты</p>

    <form id="docForm">
        <!-- Шаг 1: Выбор типа документа -->
        <div class="step">
            <span class="step-title">1. Выберите тип документа</span>
            <select id="docType" required onchange="toggleFields()">
                <option value="" disabled selected>-- Выберите документ --</option>
                <option value="policy">Политика обработки персональных данных</option>
                <option value="cookie">Политика использования Cookie</option>
                <option value="consent">Согласие на обработку ПДн (для форм)</option>
                <option value="newsletter">Согласие на рассылку</option>
                <option value="distribution">Согласие на распространение ПДн</option>
                <option value="offer">Пользовательское соглашение (Оферта)</option>
            </select>
        </div>

        <!-- Шаг 2: Данные организации -->
        <div class="step">
            <span class="step-title">2. Данные вашей организации (Оператора)</span>
            <input type="text" id="orgName" placeholder="Название организации (ООО 'Ромашка' или ИП Иванов И.И.)" required>
            <input type="text" id="orgInn" placeholder="ИНН" required>
            <input type="text" id="orgOgrn" placeholder="ОГРН" required>
            <input type="text" id="orgAddress" placeholder="Юридический адрес" required>
            <input type="email" id="orgEmail" placeholder="E-mail для связи" required>
            <input type="tel" id="orgPhone" placeholder="Телефон" required>
            <textarea id="orgDetails" placeholder="Дополнительные реквизиты (необязательно)"></textarea>
        </div>

        <!-- Шаг 3: Данные сайта -->
        <div class="step">
            <span class="step-title">3. Информация о сайте</span>
            <input type="text" id="siteDomain" placeholder="Домен сайта (example.ru)" required>
            <input type="text" id="siteName" placeholder="Название сайта (например, 'Интернет-магазин Цветы')" required>
        </div>

        <!-- Шаг 4: Функционал сайта (влияет на текст) -->
        <div class="step" id="featuresStep">
            <span class="step-title">4. Что используется на сайте?</span>
            <p class="info-text">Отметьте пункты, которые есть на вашем сайте, чтобы документ был точным.</p>

            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" name="feature" value="forms"> Формы обратной связи / Заявки
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="feature" value="cookies"> Cookies и метрики (Яндекс, Google)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="feature" value="analytics"> Системы аналитики
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="feature" value="payments"> Онлайн-оплата
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="feature" value="personal_cabinet"> Личный кабинет
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="feature" value="social_auth"> Вход через соцсети
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="feature" value="calls"> Заказ звонка
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" name="feature" value="reviews"> Отзывы / Комментарии
                </label>
            </div>
        </div>

        <button type="button" onclick="generateDocument()">Скачать документ (.docx)</button>
    </form>
</div>

<script>
    // Основная логика генерации
    const { Document, Packer, Paragraph, TextRun, HeadingLevel, AlignmentType, BulletLevel, Table, TableRow, TableCell, WidthType } = docx;

    function getCheckedFeatures() {
        const checkboxes = document.querySelectorAll('input[name="feature"]:checked');
        return Array.from(checkboxes).map(cb => cb.value);
    }

    function getData() {
        return {
            docType: document.getElementById('docType').value,
            org: {
                name: document.getElementById('orgName').value,
                inn: document.getElementById('orgInn').value,
                ogrn: document.getElementById('orgOgrn').value,
                address: document.getElementById('orgAddress').value,
                email: document.getElementById('orgEmail').value,
                phone: document.getElementById('orgPhone').value,
                details: document.getElementById('orgDetails').value
            },
            site: {
                domain: document.getElementById('siteDomain').value,
                name: document.getElementById('siteName').value
            },
            features: getCheckedFeatures()
        };
    }

    function generateDocument() {
        const data = getData();

        if (!data.docType) {
            alert("Пожалуйста, выберите тип документа.");
            return;
        }
        if (!data.org.name || !data.site.domain) {
            alert("Заполните обязательные поля (Название организации и Домен сайта).");
            return;
        }

        let content = [];

        // Заголовок документа
        const titleMap = {
            'policy': 'ПОЛИТИКА ОБРАБОТКИ ПЕРСОНАЛЬНЫХ ДАННЫХ',
            'cookie': 'ПОЛИТИКА ИСПОЛЬЗОВАНИЯ COOKIE',
            'consent': 'СОГЛАСИЕ НА ОБРАБОТКУ ПЕРСОНАЛЬНЫХ ДАННЫХ',
            'newsletter': 'СОГЛАСИЕ НА РАССЫЛКУ',
            'distribution': 'СОГЛАСИЕ НА РАСПРОСТРАНЕНИЕ ПЕРСОНАЛЬНЫХ ДАННЫХ',
            'offer': 'ПОЛЬЗОВАТЕЛЬСКОЕ СОГЛАШЕНИЕ (ОФЕРТА)'
        };

        content.push(new Paragraph({
            text: titleMap[data.docType],
            heading: HeadingLevel.HEADING_1,
            alignment: AlignmentType.CENTER,
            spacing: { after: 200 }
        }));

        // Генерация контента в зависимости от типа
        if (data.docType === 'policy') {
            content = [...content, ...generatePolicyContent(data)];
        } else if (data.docType === 'cookie') {
            content = [...content, ...generateCookieContent(data)];
        } else if (data.docType === 'consent') {
            content = [...content, ...generateConsentContent(data)];
        } else if (data.docType === 'newsletter') {
            content = [...content, ...generateNewsletterContent(data)];
        } else if (data.docType === 'distribution') {
            content = [...content, ...generateDistributionContent(data)];
        } else if (data.docType === 'offer') {
            content = [...content, ...generateOfferContent(data)];
        }

        // Создание документа
        const doc = new Document({
            sections: [{
                properties: {},
                children: content
            }]
        });

        // Скачивание
        Packer.toBlob(doc).then(blob => {
            saveAs(blob, `${data.docType}_${data.site.domain}.docx`);
        });
    }

    // --- ГЕНЕРАТОРЫ КОНТЕНТА ДЛЯ КАЖДОГО ТИПА ---

    function generatePolicyContent(data) {
        const featuresText = getFeaturesDescription(data.features);

        return [
            new Paragraph({ text: `1. Общие положения`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `Настоящая политика обработки персональных данных составлена в соответствии с требованиями Федерального закона от 27.07.2006. № 152-ФЗ «О персональных данных» и определяет порядок обработки персональных данных и меры по обеспечению безопасности персональных данных, предпринимаемые ${data.org.name} (далее – Оператор).`, spacing: { after: 200 } }),
            new Paragraph({ text: `1.1. Оператор ставит своей важнейшей целью и условием осуществления своей деятельности соблюдение прав и свобод человека и гражданина при обработке его персональных данных, в том числе защиты прав на неприкосновенность частной жизни, личную и семейную тайну.`, spacing: { after: 200 } }),
            new Paragraph({ text: `1.2. Настоящая политика Оператора в отношении обработки персональных данных (далее – Политика) применяется ко всей информации, которую Оператор может получить о посетителях веб-сайта ${data.site.domain}.`, spacing: { after: 200 } }),

            new Paragraph({ text: `2. Основные понятия, используемые в Политике`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `2.1. Веб-сайт – совокупность графических и информационных материалов, а также программ для ЭВМ и баз данных, обеспечивающих их доступность в сети интернет по сетевому адресу ${data.site.domain}.`, spacing: { after: 200 } }),
            new Paragraph({ text: `2.2. Персональные данные – любая информация, относящаяся прямо или косвенно к определенному или определяемому Пользователю веб-сайта.`, spacing: { after: 200 } }),

            new Paragraph({ text: `3. Оператор может обрабатывать следующие персональные данные Пользователя`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `3.1. Фамилия, имя, отчество.`, spacing: { after: 100 } }),
            new Paragraph({ text: `3.2. Электронный адрес.`, spacing: { after: 100 } }),
            new Paragraph({ text: `3.3. Номера телефонов.`, spacing: { after: 100 } }),
            ...(data.features.includes('payments') ? [new Paragraph({ text: `3.4. Реквизиты банковских карт (при оплате).`, spacing: { after: 100 } })] : []),
            new Paragraph({ text: `3.5. Также на сайте происходит сбор и обработка обезличенных данных о посетителях (в т.ч. файлов «cookie») с помощью сервисов интернет-статистики (Яндекс Метрика и Гугл Аналитика и других).`, spacing: { after: 200 } }),

            new Paragraph({ text: `4. Цели обработки персональных данных`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `4.1. Цель обработки персональных данных Пользователя — информирование Пользователя посредством отправки электронных писем; заключение, исполнение и прекращение гражданско-правовых договоров; предоставление доступа Пользователю к сервисам, информации и/или материалам, содержащимся на веб-сайте ${data.site.domain}.`, spacing: { after: 200 } }),
            new Paragraph({ text: `4.2. Также Оператор имеет право направлять Пользователю уведомления о новых продуктах и услугах, специальных предложениях и различных событиях.`, spacing: { after: 200 } }),

            new Paragraph({ text: `5. Правовые основания обработки персональных данных`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `5.1. Оператор обрабатывает персональные данные Пользователя только в случае их заполнения и/или отправки Пользователем самостоятельно через специальные формы, расположенные на сайте ${data.site.domain}. Заполняя соответствующие формы, Пользователь выражает свое согласие с данной Политикой.`, spacing: { after: 200 } }),

            new Paragraph({ text: `6. Порядок сбора, хранения, передачи и других видов обработки персональных данных`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `6.1. Безопасность персональных данных, которые обрабатываются Оператором, обеспечивается путем реализации правовых, организационных и технических мер, необходимых для выполнения в полном объеме требований действующего законодательства.`, spacing: { after: 200 } }),
            new Paragraph({ text: `6.2. Оператор обеспечивает сохранность персональных данных и принимает все возможные меры, исключающие доступ к персональным данным неуполномоченных лиц.`, spacing: { after: 200 } }),
            new Paragraph({ text: `6.3. Все персональные данные Пользователя без каких-либо исключительных условий могут быть переданы лицам, связанным с деятельностью Оператора на законных основаниях (сотрудники, подрядчики), исключительно в целях выполнения функций Оператора.`, spacing: { after: 200 } }),

            new Paragraph({ text: `7. Заключительные положения`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `7.1. Пользователь может получить любые разъяснения по интересующим вопросам, касающимся обработки его персональных данных, обратившись к Оператору с помощью электронной почты ${data.org.email}.`, spacing: { after: 200 } }),
            new Paragraph({ text: `7.2. В данном документе будут отражены любые изменения политики обработки персональных данных Оператором.`, spacing: { after: 200 } }),

            new Paragraph({ text: `Реквизиты Оператора:`, heading: HeadingLevel.HEADING_3 }),
            new Paragraph({ text: `${data.org.name}\nИНН: ${data.org.inn}\nОГРН: ${data.org.ogrn}\nАдрес: ${data.org.address}\nТелефон: ${data.org.phone}\nEmail: ${data.org.email}`, spacing: { after: 200 } })
        ];
    }

    function generateCookieContent(data) {
        return [
            new Paragraph({ text: `1. Мы используем файлы cookie`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `Наш сайт ${data.site.domain} использует файлы cookie для улучшения работы сайта и анализа трафика. Продолжая использовать сайт, вы соглашаетесь с использованием нами ваших файлов cookie.`, spacing: { after: 200 } }),

            new Paragraph({ text: `2. Что такое файлы cookie?`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `Файлы cookie — это небольшие текстовые файлы, которые сохраняются на вашем устройстве (компьютере, смартфоне или планшете) при посещении веб-сайтов. Они позволяют сайту запоминать ваши действия и предпочтения.`, spacing: { after: 200 } }),

            new Paragraph({ text: `3. Какие типы cookie мы используем`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `3.1. Необходимые cookie: обеспечивают работу сайта (авторизация, корзины).`, spacing: { after: 100 } }),
            new Paragraph({ text: `3.2. Аналитические cookie: помогают понять, как пользователи взаимодействуют с сайтом (Яндекс.Метрика, Google Analytics).`, spacing: { after: 100 } }),
            new Paragraph({ text: `3.3. Маркетинговые cookie: используются для отслеживания посетителей на сайтах для показа релевантной рекламы.`, spacing: { after: 200 } }),

            new Paragraph({ text: `4. Управление cookie`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `Вы можете управлять настройками cookie в своем браузере. Однако, если вы отключите cookie, некоторые функции сайта могут стать недоступными.`, spacing: { after: 200 } }),

            new Paragraph({ text: `Контакты:`, heading: HeadingLevel.HEADING_3 }),
            new Paragraph({ text: `${data.org.name}\nEmail: ${data.org.email}`, spacing: { after: 200 } })
        ];
    }

    function generateConsentContent(data) {
        return [
            new Paragraph({ text: `Я, нижеподписавшийся, в соответствии с Федеральным законом от 27.07.2006 № 152-ФЗ «О персональных данных», даю свое согласие ${data.org.name} (далее – Оператор), расположенному по адресу: ${data.org.address}, на обработку моих персональных данных.`, spacing: { after: 200 } }),

            new Paragraph({ text: `1. Перечень персональных данных`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `Согласие дается на обработку следующих персональных данных: фамилия, имя, отчество, номер телефона, адрес электронной почты, а также иные данные, предоставленные мной через формы на сайте ${data.site.domain}.`, spacing: { after: 200 } }),

            new Paragraph({ text: `2. Цели обработки`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `Обработка данных осуществляется в следующих целях: ${data.features.includes('newsletter') ? 'рассылка информационных материалов, ' : ''}обработка заявок, связь с пользователем, улучшение качества обслуживания.`, spacing: { after: 200 } }),

            new Paragraph({ text: `3. Действия с данными`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `Под обработкой персональных данных понимаются действия (операции) с персональными данными, включая сбор, запись, систематизацию, накопление, хранение, уточнение (обновление, изменение), извлечение, использование, передачу (распространение, предоставление, доступ), обезличивание, блокирование, удаление, уничтожение персональных данных.`, spacing: { after: 200 } }),

            new Paragraph({ text: `4. Срок действия`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `Согласие действует до момента его отзыва в письменной форме либо до достижения целей обработки.`, spacing: { after: 200 } })
        ];
    }

    function generateNewsletterContent(data) {
        return [
            new Paragraph({ text: `Я выражаю свое согласие ${data.org.name} (ИНН ${data.org.inn}) на получение информационных рассылок на указанный мной адрес электронной почты или номер телефона.`, spacing: { after: 200 } }),
            new Paragraph({ text: `1. Характер информации`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `Рассылка может содержать информацию о новостях компании ${data.site.domain}, специальных предложениях, акциях и мероприятиях.`, spacing: { after: 200 } }),
            new Paragraph({ text: `2. Частота отправок`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `Рассылка осуществляется не чаще чем 1 раз в неделю (если иное не согласовано дополнительно).`, spacing: { after: 200 } }),
            new Paragraph({ text: `3. Отзыв согласия`, heading: HeadingLevel.HEADING_2 }),
            new Paragraph({ text: `Я могу отозвать свое согласие в любой момент, нажав на ссылку «Отписаться» в письме или направив запрос на адрес ${data.org.email}.`, spacing: { after: 200 } })
        ];
    }

    function generateDistributionContent(data) {
        return [
            new Paragraph({ text: `В соответствии с п. 1 ст. 10.1 ФЗ № 152 «О персональных данных» я даю отдельное согласие ${data.org.name} на распространение моих персональных данных.`, spacing: { after: 200 } }),
            new Paragraph({ text: `1. Перечень данных для распространения`, heading: HeadingLevel.HEADING_2 }),
